<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velumie | Where Light Meets Emotion</title>
    
    <meta name="description" content="Velumie - Vẻ đẹp mong manh, ánh sáng vĩnh cửu. Art & Fine Art Photography.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fcfcfc; 
            /* Font chữ Cormorant tạo cảm giác nghệ thuật hơn Georgia */
            font-family: 'Cormorant Garamond', serif; 
            color: #333;
            text-align: center;
            /* Hiệu ứng hiện ra từ sương mờ (Tĩnh trong Động) */
            animation: fadeIn 3s ease-in-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; filter: blur(8px); }
            100% { opacity: 1; filter: blur(0); }
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.5rem; /* Giãn chữ rộng tạo sự thoáng đãng */
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 1.2rem;
            font-style: italic;
            color: #777;
            letter-spacing: 0.1rem;
            margin-bottom: 30px;
        }

        .mantra {
            font-size: 0.9rem;
            color: #999;
            line-height: 1.8;
            max-width: 400px;
            margin: 0 auto;
        }

        .coming-soon {
            margin-top: 60px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.6rem;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VELUMIE</h1>
        <div class="slogan">Where Light Meets Emotion</div>
        
        <div class="mantra">
            Vẻ đẹp mong manh, ánh sáng vĩnh cửu.<br>
            <span style="font-size: 0.8rem; opacity: 0.7;">
                Beauté éphémère, lumière éternelle.<br>
                Hakanaki bi, towa no hikari.
            </span>
        </div>

        <div class="coming-soon">Coming Soon</div>
    </div>
</body>
</html>
